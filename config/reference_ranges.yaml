# HealthTests Aggregator — Valores de Referência
#
# Campos obrigatórios por entrada:
#   unit    : unidade de medida
#   aliases : nomes como aparecem no DataFrame (uppercase, normalizado)
#   type    : range | max_only | min_only | qualitative
#
# Campos opcionais:
#   min, max : limites numéricos
#   note     : observação (ex: "Masculino", "Em jejum")
#   zones    : faixas coloridas para o gráfico de análise
#     - label : nome da faixa
#       color : cor hexadecimal
#       min   : limite inferior (omitir = faixa aberta à esquerda)
#       max   : limite superior (omitir = faixa aberta à direita)
#
# Para editar interativamente: python update_references.py
# AVISO: comentários são removidos ao salvar pelo script de atualização.

# ── Metabolismo da Glicose ──────────────────────────────────────────────────

GLICOSE:
  unit: mg/dL
  aliases:
    - GLICOSE
  type: range
  min: 70.0
  max: 99.0
  note: "Em jejum"
  zones:
    - label: "Hipoglicemia"
      color: "#d62728"
      max: 70.0
    - label: "Normal"
      color: "#2ca02c"
      min: 70.0
      max: 99.0
    - label: "Pré-diabético"
      color: "#ff7f0e"
      min: 100.0
      max: 125.0
    - label: "Diabético"
      color: "#d62728"
      min: 126.0

HEMOGLOBINA GLICADA:
  unit: "%"
  aliases:
    - HEMOGLOBINA GLICADA
  type: range
  min: 4.0
  max: 5.7
  zones:
    - label: "Normal"
      color: "#2ca02c"
      max: 5.7
    - label: "Pré-diabético"
      color: "#ff7f0e"
      min: 5.7
      max: 6.4
    - label: "Diabético"
      color: "#d62728"
      min: 6.5

INSULINA:
  unit: mU/L
  aliases:
    - INSULINA
  type: range
  min: 2.0
  max: 25.0
  note: "Em jejum"

FRUTOSAMINA:
  unit: micromol/L
  aliases:
    - FRUTOSAMINA
  type: range
  min: 205.0
  max: 285.0

